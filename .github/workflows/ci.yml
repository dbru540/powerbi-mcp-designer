name: CI

on:
  pull_request:
  push:
    branches: ["main", "master", "feature/**"]
  workflow_dispatch:

jobs:
  test:
    name: Test and build
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s powerbi_mcp/tests

      - name: Run smoke test
        run: python powerbi_mcp/smoke_test.py

      - name: Build distribution
        run: |
          python -m pip install build
          python -m build

      - name: Check distribution artifacts
        run: python scripts/check_distribution.py --dist-dir dist

      - name: Verify console scripts
        run: |
          powerbi-mcp-server --help
          powerbi-mcp-doctor --project example --no-validate
